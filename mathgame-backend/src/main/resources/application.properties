# Menggunakan URL database penuh bawaan Railway jika ada, atau fallback ke localhost saat di laptop
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/math_game}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${MYSQLUSER:root}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${MYSQLPASSWORD:}}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Menyerahkan penentuan port sepenuhnya ke sistem Railway secara dinamis
server.port=${PORT:8081}

spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false