<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Utama - MathGame</title>
    <!-- Mengambil Tailwind CSS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Mengambil Font Fredoka agar serasi dengan halaman Login -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
        }
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .hover-bounce:hover img {
            animation: float-slow 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Dekorasi Cahaya Latar Belakang -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>

    <!-- Kotak Menu Utama (Ukuran max-w-3xl disesuaikan agar 2 kolom muat sempurna) -->
    <div class="bg-gradient-to-b from-slate-900 via-slate-900 to-slate-950 p-6 md:p-10 rounded-[2.5rem] shadow-2xl shadow-black border-4 border-slate-800 w-full max-w-3xl relative z-10 text-center">
        
        <!-- Bagian Header Judul -->
        <div class="mb-8">
            <h1 class="text-3xl md:text-4xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400 uppercase">
                PILIH MODE KUIS
            </h1>
            <p class="text-slate-400 text-sm mt-2 max-w-md mx-auto">
                Halo <span id="userGreeting" class="text-yellow-400 font-bold">Chantika</span>, pilih operasi matematika yang ingin kamu taklukkan hari ini!
            </p>
        </div>

        <!-- Grid 4 Pilihan Mode Kuis (Memastikan 2 kolom sejajar) -->
        <div class="grid grid-cols-2 gap-4 md:gap-6 mb-8">
            
            <!-- Tombol Penjumlahan -->
            <button onclick="selectMode('penjumlahan')" 
                class="hover-bounce bg-slate-950/60 hover:bg-slate-900 border-2 border-slate-800 hover:border-cyan-500/50 p-5 rounded-3xl flex flex-col items-center justify-center text-center transition-all duration-300 group cursor-pointer hover:shadow-lg hover:shadow-cyan-500/5 active:scale-95 min-h-[180px]">
                <div class="w-20 h-20 flex items-center justify-center mb-3">
                    <img src="tambah.png" alt="Penjumlahan" class="w-full h-full object-contain transition-transform duration-300 group-hover:scale-110">
                </div>
                <h3 class="text-white font-bold text-base md:text-lg group-hover:text-cyan-400 transition-colors">Penjumlahan</h3>
            </button>

            <!-- Tombol Pengurangan -->
            <button onclick="selectMode('pengurangan')" 
                class="hover-bounce bg-slate-950/60 hover:bg-slate-900 border-2 border-slate-800 hover:border-rose-500/50 p-5 rounded-3xl flex flex-col items-center justify-center text-center transition-all duration-300 group cursor-pointer hover:shadow-lg hover:shadow-rose-500/5 active:scale-95 min-h-[180px]">
                <div class="w-20 h-20 flex items-center justify-center mb-3">
                    <img src="kurang.png" alt="Pengurangan" class="w-full h-full object-contain transition-transform duration-300 group-hover:scale-110">
                </div>
                <h3 class="text-white font-bold text-base md:text-lg group-hover:text-rose-300 transition-colors">Pengurangan</h3>
            </button>
                
            <!-- Tombol Perkalian -->
            <button onclick="selectMode('perkalian')" 
                class="hover-bounce bg-slate-950/60 hover:bg-slate-900 border-2 border-slate-800 hover:border-yellow-500/50 p-5 rounded-3xl flex flex-col items-center justify-center text-center transition-all duration-300 group cursor-pointer hover:shadow-lg hover:shadow-yellow-500/5 active:scale-95 min-h-[180px]">
                <div class="w-20 h-20 flex items-center justify-center mb-3">
                    <img src="kali.png" alt="Perkalian" class="w-full h-full object-contain transition-transform duration-300 group-hover:scale-110">
                </div>
                <h3 class="text-white font-bold text-base md:text-lg group-hover:text-yellow-400 transition-colors">Perkalian</h3>
            </button>

            <!-- Tombol Pembagian -->
            <button onclick="selectMode('pembagian')" 
                class="hover-bounce bg-slate-950/60 hover:bg-slate-900 border-2 border-slate-800 hover:border-emerald-500/50 p-5 rounded-3xl flex flex-col items-center justify-center text-center transition-all duration-300 group cursor-pointer hover:shadow-lg hover:shadow-emerald-500/5 active:scale-95 min-h-[180px]">
                <div class="w-20 h-20 flex items-center justify-center mb-3">
                    <img src="bagi.png" alt="Pembagian" class="w-full h-full object-contain transition-transform duration-300 group-hover:scale-110">
                </div>
                <h3 class="text-white font-bold text-base md:text-lg group-hover:text-emerald-400 transition-colors">Pembagian</h3>
            </button>

        </div>

        <!-- Tombol Keluar Akun -->
        <button onclick="logout()" class="text-slate-500 hover:text-rose-400 font-medium text-sm transition-colors cursor-pointer inline-flex items-center gap-1 hover:underline">
            &larr; Keluar Akun
        </button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedUsername = sessionStorage.getItem("username");
            if (savedUsername) {
                document.getElementById("userGreeting").innerText = savedUsername;
            }
        });

        function selectMode(mode) {
            console.log("Mode kuis terpilih: " + mode);
            sessionStorage.setItem("gameMode", mode);
            window.location.href = "game.html";
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
