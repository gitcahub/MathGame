<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MathGame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #fef9c3 50%, #fce7f3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            display: flex;
            width: 100%;
            max-width: 860px;
            min-height: 480px;
            overflow: hidden;
        }

        /* KIRI - Gambar */
        .left-panel {
            background: linear-gradient(160deg, #bae6fd, #e0f2fe);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            position: relative;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }

        .left-panel img {
            width: 100%;
            max-width: 280px;
            height: auto;
            object-fit: contain;
            animation: float 4s ease-in-out infinite;
        }

        .left-panel h2 {
            color: #0369a1;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-top: 16px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* KANAN - Form */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 40px;
        }

        .right-panel h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0ea5e9;
            margin-bottom: 6px;
        }

        .right-panel p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            color: #334155;
            background: #f8fafc;
            outline: none;
            margin-bottom: 18px;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #facc15;
            background: white;
            box-shadow: 0 0 0 4px rgba(250,204,21,0.15);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #ef4444;
            color: white;
            border: none;
            border-bottom: 4px solid #b91c1c;
            border-radius: 16px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 4px;
        }

        .btn-login:hover { background: #dc2626; }
        .btn-login:active { border-bottom: 1px solid #b91c1c; transform: translateY(2px); }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #94a3b8;
        }

        .register-link a {
            color: #0ea5e9;
            font-weight: 700;
            text-decoration: underline;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .card { flex-direction: column; }
            .left-panel { padding: 30px 20px; }
            .left-panel img { max-width: 180px; }
            .right-panel { padding: 30px 24px; }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- KIRI: Gambar -->
    <div class="left-panel">
        <img src="halamanlogin.png" alt="Math Game Kids">
        <h2>Uji Kemampuan Matematikamu! 🎯</h2>
    </div>

    <!-- KANAN: Form Login -->
    <div class="right-panel">
        <h1>Selamat Datang!</h1>
        <p>Masuk untuk mulai bermain dan kumpulkan skor tertinggi</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <label for="username">Nama Pengguna (Username)</label>
            <input type="text" id="username" required autocomplete="off"
                placeholder="Ketik username kamu di sini...">

            <label for="password">Kata Sandi (Password)</label>
            <input type="password" id="password" required
                placeholder="••••••••">

            <button type="submit" class="btn-login">MULAI MASUK! 🚀</button>
        </form>

        <div class="register-link">
            Belum punya akun?
            <a href="register.html">Daftar Akun Baru</a>
        </div>
    </div>
</div>

<script>
    function handleLogin(event) {
        event.preventDefault();

        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value.trim();

        if (usernameInput === "" || passwordInput === "") {
            alert("Username dan Password tidak boleh kosong!");
            return;
        }

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: usernameInput, password: passwordInput })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success === true || data.success === "true") {
                alert("Login Berhasil! Selamat Datang " + usernameInput);
                sessionStorage.setItem("username", usernameInput);
                window.location.href = "menu.html";
            } else {
                alert("Gagal: " + (data.message || "Username atau Password salah!"));
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Tidak dapat terhubung ke server backend.");
        });
    }
</script>

</body>
</html>
