<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MathGame</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
        }
        @keyframes playful-float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
        }
        .animate-playful {
            animation: playful-float 4s ease-in-out infinite;
        }
    </style>
</head>
<!-- PERBAIKAN: Mengganti overflow-hidden menjadi overflow-y-auto dan menambah padding py-12 agar bisa di-scroll jika layar kecil -->
<body class="bg-sky-50 min-h-screen flex items-center justify-center p-4 py-12 relative overflow-y-auto">

    <div class="absolute top-[-5%] left-[-5%] w-72 h-72 bg-yellow-200 rounded-full blur-3xl opacity-50"></div>
    <div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-red-200 rounded-full blur-3xl opacity-40"></div>
    <div class="absolute top-1/3 right-[-10%] w-64 h-64 bg-green-200 rounded-full blur-3xl opacity-40"></div>

    <div class="bg-gradient-to-b from-sky-200 via-sky-50 to-white p-8 rounded-[2.5rem] shadow-2xl shadow-sky-900/20 border-4 border-white w-full max-w-md relative z-10 transition-all duration-300">

        <div class="flex justify-center relative mb-2">
            <div class="animate-playful w-full max-w-[200px] -mt-4 -mb-2 drop-shadow-xl z-20">
                <img src="halamanlogin.png" alt="Math Game Kids" class="w-full h-auto object-contain">
            </div>
        </div>

        <div class="text-center mb-6">
            <p class="text-slate-500 text-sm font-medium tracking-wide">Ayo masuk dan uji kemampuan matematikamu!</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-bold text-sky-600 mb-1.5 ml-1">Nama Pengguna (Username)</label>
                <input type="text" id="username" required autocomplete="off"
                    class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl px-4 py-3.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-400/20 transition-all duration-200 text-sm font-medium"
                    placeholder="Ketik username kamu di sini...">
            </div>

            <div>
                <label for="password" class="block text-sm font-bold text-sky-600 mb-1.5 ml-1">Kata Sandi (Password)</label>
                <input type="password" id="password" required
                    class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl px-4 py-3.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-400/20 transition-all duration-200 text-sm"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-500/20 hover:shadow-red-500/30 border-b-4 border-red-700 active:border-b-0 active:mt-1 transition-all duration-100 cursor-pointer text-base uppercase tracking-wider">
                Mulai Masuk!
            </button>
        </form>

        <div class="text-center mt-6 text-sm font-medium text-slate-500">
            Belum mendaftar akun?
            <a href="register.html" class="text-sky-500 hover:text-sky-600 font-bold transition-colors ml-1 underline decoration-2">
                Daftar Akun Baru
            </a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();

            if (usernameInput === "" || passwordInput === "") {
                alert("Username dan Password tidak boleh kosong!");
                return;
            }

            // Menggunakan URL relatif agar otomatis menyesuaikan host & port server Spring Boot aktif
            fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: usernameInput,
                    password: passwordInput
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success === true || data.success === "true") {
                    alert("Login Berhasil! Selamat Datang " + usernameInput);
                    sessionStorage.setItem("username", usernameInput);
                    window.location.href = "menu.html";
                } else {
                    alert("Gagal: " + (data.message || "Username atau Password salah!"));
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Tidak dapat terhubung ke server backend.");
            });
        }
    </script>
</body>
</html>
